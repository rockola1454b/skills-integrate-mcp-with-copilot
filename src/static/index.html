<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="teacher-toolbar">
          <button id="teacher-menu-toggle" class="icon-button" type="button" aria-expanded="false" aria-controls="teacher-auth-panel" aria-label="Open teacher login">👤</button>
          <div id="teacher-auth-panel" class="auth-panel hidden">
            <button id="teacher-login-toggle" class="secondary-button" type="button">Teacher Login</button>
            <form id="teacher-login-form" class="auth-form hidden">
              <div class="form-group">
                <label for="teacher-username">Username:</label>
                <input type="text" id="teacher-username" required />
              </div>
              <div class="form-group">
                <label for="teacher-password">Password:</label>
                <input type="password" id="teacher-password" required />
              </div>
              <button type="submit">Log In</button>
            </form>
            <p id="auth-status" class="auth-status">Sign in as a teacher to manage registrations.</p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="signup-form-hint" class="form-hint">Teacher login is required to update participant lists.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit" id="signup-submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
